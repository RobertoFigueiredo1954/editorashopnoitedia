<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Primeiro Site</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f5f5;
      text-align:center;
      padding:50px;
    }

    .card{
      background:white;
      padding:30px;
      max-width:600px;
      margin:auto;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,.1);
    }

    h1{
      color:#0077cc;
    }

    button{
      padding:12px 20px;
      border:none;
      background:#0077cc;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Meu Primeiro Site</h1>

  <p>Este site foi criado por mim com a ajuda do ChatGPT.</p>

  <button onclick="alert('Parabéns! Seu site está funcionando!')">
    Clique aqui
  </button>
</div>

</body>
</html>
